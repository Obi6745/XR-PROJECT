<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafeRoute XR - Final Project</title>
    <style>
      html,
      body {
        overflow: hidden;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #000;
        color: #fff;
      }

      #renderCanvas {
        width: 100%;
        height: 100%;
        touch-action: none;
        display: block;
      }

      #overlay-ui {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0.5rem 0.75rem;
        padding-top: max(0.5rem, env(safe-area-inset-top, 0px));
        padding-bottom: 0.5rem;
        padding-left: max(1rem, env(safe-area-inset-left, 0px));
        padding-right: max(1rem, env(safe-area-inset-right, 0px));
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.85),
          transparent
        );
        z-index: 10;
        font-size: 0.9rem;
        pointer-events: none;
        -webkit-tap-highlight-color: transparent;
      }

      #overlay-ui .overlay-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
        justify-content: flex-end;
        align-items: center;
        flex: 1 1 12rem;
        min-width: 0;
      }

      #overlay-ui button {
        pointer-events: auto;
        background: #121826;
        color: #f9fafb;
        border: 1px solid #4b5563;
        border-radius: 999px;
        padding: 0.5rem 1rem;
        min-height: 44px;
        font-size: max(0.8rem, 14px);
        cursor: pointer;
        touch-action: manipulation;
      }

      #overlay-ui button.active {
        background: #22c55e;
        border-color: #16a34a;
        color: #022c22;
        font-weight: 600;
      }

      #status {
        font-size: 0.875rem;
        font-weight: 500;
        line-height: 1.35;
        opacity: 0.95;
        pointer-events: none;
        min-width: 0;
        flex: 1 1 10rem;
        margin-right: 0.25rem;
      }

      @media (max-width: 560px) {
        #overlay-ui {
          flex-direction: column;
          align-items: stretch;
        }

        #status {
          flex: none;
          width: 100%;
          margin-right: 0;
        }

        #overlay-ui .overlay-buttons {
          justify-content: flex-start;
        }
      }

      #enter-ar-container {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #111827, #020617);
        z-index: 5;
        pointer-events: auto;
      }

      #enter-ar-container .splash-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: center;
      }

      #enter-ar-container button {
        padding: 0.9rem 1.4rem;
        min-height: 48px;
        border-radius: 999px;
        border: none;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        touch-action: manipulation;
      }

      #enter-ar {
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: #022c22;
        box-shadow: 0 18px 35px rgba(34, 197, 94, 0.35);
      }

      #preview-only-btn {
        background: #1f2937;
        color: #e5e7eb;
        border: 1px solid #4b5563;
        box-shadow: none;
      }

      #info {
        position: fixed;
        left: max(0.75rem, env(safe-area-inset-left, 0px));
        bottom: max(0.75rem, env(safe-area-inset-bottom, 0px));
        right: max(0.75rem, env(safe-area-inset-right, 0px));
        font-size: 0.75rem;
        line-height: 1.4;
        color: #e5e7eb;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.7);
        pointer-events: none;
        z-index: 8;
      }
    </style>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://code.jquery.com/pep/0.4.3/pep.js"></script>
    <script src="./main.js" defer></script>
  </head>
  <body>
    <canvas id="renderCanvas" touch-action="none"></canvas>

    <div id="overlay-ui">
      <div id="status">SafeRoute XR · Ready</div>
      <div class="overlay-buttons">
        <button type="button" id="enter-ar-overlay">Enter AR</button>
        <button type="button" id="lock-placement-btn" disabled>
          Lock to floor
        </button>
        <button type="button" id="reset-placement-btn" disabled>
          Unlock
        </button>
        <button id="nav-mode-btn" class="active">Navigation Mode</button>
        <button id="safety-mode-btn">Safety Mode</button>
        <button id="audio-btn">Audio: Off</button>
      </div>
    </div>

    <div id="enter-ar-container">
      <div class="splash-buttons">
        <button type="button" id="enter-ar">Start AR</button>
        <button type="button" id="preview-only-btn">Preview (no AR)</button>
      </div>
      <p
        style="
          margin: 0 1.5rem;
          max-width: 22rem;
          text-align: center;
          font-size: 0.8rem;
          opacity: 0.85;
        "
      >
        Preview: orbit the 4-way intersection on a textured ground. AR uses
        hit-test to place the same layout on a real surface.
      </p>
    </div>

    <div id="info">
      In AR: aim at the floor until the layout appears, then tap Lock to floor
      so it stays put. Unlock if you need to move it. Preview mode: drag to
      orbit.
    </div>
  </body>
</html>
