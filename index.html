<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SafeRoute XR - 4-Way Intersection Prototype</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Start with basic styles -->
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #000;
        color: #fff;
      }

      #overlay-ui {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.5rem 1rem;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.85), transparent);
        z-index: 10;
        font-size: 0.9rem;
      }

      #overlay-ui button {
        background: #121826;
        color: #f9fafb;
        border: 1px solid #4b5563;
        border-radius: 999px;
        padding: 0.35rem 0.9rem;
        font-size: 0.8rem;
        cursor: pointer;
      }
