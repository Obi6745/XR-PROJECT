<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SafeRoute XR - 4-Way Intersection Prototype</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Start with basic styles -->
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #000;
        color: #fff;
      }

      #overlay-ui {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.5rem 1rem;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.85), transparent);
        z-index: 10;
        font-size: 0.9rem;
      }

      #overlay-ui button {
        background: #121826;
        color: #f9fafb;
        border: 1px solid #4b5563;
        border-radius: 999px;
        padding: 0.35rem 0.9rem;
        font-size: 0.8rem;
        cursor: pointer;
      }

      #overlay-ui button.active {
        background: #22c55e;
        border-color: #16a34a;
        color: #022c22;
        font-weight: 600;
      }

      #status {
        font-size: 0.75rem;
        opacity: 0.85;
      }

      #enter-ar-container {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #111827, #020617);
        z-index: 5;
      }

      #enter-ar {
        padding: 0.9rem 1.4rem;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: #022c22;
        font-size: 1rem;
        font-weight: 600;
        box-shadow: 0 18px 35px rgba(34, 197, 94, 0.35);
        cursor: pointer;
      }

      #enter-ar:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        box-shadow: none;
      }

      #info {
        position: fixed;
        left: 0.75rem;
        bottom: 0.75rem;
        right: 0.75rem;
        font-size: 0.75rem;
        line-height: 1.4;
        color: #e5e7eb;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.7);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="overlay-ui">
      <div id="status">SafeRoute XR · Ready</div>
      <div>
        <button id="nav-mode-btn" class="active">Navigation Mode</button>
        <button id="safety-mode-btn">Safety Mode</button>
        <button id="audio-btn">Audio: Off</button>
      </div>
    </div>

    <div id="enter-ar-container">
      <button id="enter-ar">Start SafeRoute XR</button>
    </div>

    <div id="info">
      Stand at a 4-way intersection and move your phone slowly to scan the
      ground. When anchors appear, you will see:
      <br />
      - Green: suggested safe crosswalk path
      <br />
      - Red: high-risk intersection zone
      <br />
      - Floating prompts: "WAIT", "CROSS", "LOOK LEFT / RIGHT"
    </div>

    <!-- Three.js and WebXR helpers-->
    <script src="https://unpkg.com/three@0.165.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.165.0/examples/jsm/controls/OrbitControls.js" type="module"></script>
    <script
      src="https://unpkg.com/three@0.165.0/examples/jsm/webxr/ARButton.js"
      type="module"
    ></script>

    <script type="module" src="./main.js"></script>
  </body>
</html>
